name: publish-cryptex-lib.yml

on:
  workflow_dispatch:
    inputs:
      release-tag-name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string
        
permissions:
  contents: write

jobs:
  pre-publish:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ReSharper Inspection
        uses: ./.github/actions/resharper-inspect
        with:
          solution_name: 'Cryptex'
          reports_path: 'linter-reports'

      - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ inputs.release-tag-name }}
            name: Release ${{ inputs.release-tag-name }}
            generate_release_notes: true

  publish-aot:
    name: Publish for ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: pre-publish
    strategy:
      matrix: 
        include:
          - os: windows-latest
            rid: win-x64
            ext: .dll
          - os: ubuntu-latest
            rid: linux-x64
            ext: .so
          - os: macos-latest
            rid: osx-arm64
            ext: .dylib
          - os: macos-13
            rid: osx-x64
            ext: .dylib
    steps:
      - name: Checkout repository
          uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT dependencies
          if: runner.os == 'Linux'
          run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      
      - name: Publish Cryptex
        run: |
          dotnet publish Cryptex/Cryptex.csproj -c Release -r ${{ matrix.rid }} -p:PublishAOT=true -p:TreatWarningsAsErrors:true --output ./publish-folder/${{ matrix.rid }}

      - name: Rename library for release
          shell: bash
          run: |
            mv "./publish-folder/${{ matrix.rid }}/Cryptex${{ matrix.ext }}" "./publish-folder/out/MyLibrary-${{ matrix.rid }}${ext}"

        - name: Upload to GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ inputs.release-tag-name }}
            files: ./publish-folder/out/Cryptex-${{ matrix.rid }}${{ matrix.ext }}