name: Publish Cryptex Lib

on:
  workflow_dispatch:
    inputs:
      release-tag-name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string
      is-prerelease:
        description: 'Mark as pre-release? (e.g. beta, rc)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  pre-publish:
    runs-on: ubuntu-latest
    name: Pre-publish
    container: mcr.microsoft.com/dotnet/sdk:10.0
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ReSharper Inspection
        uses: ./.github/actions/resharper-inspect
        with:
          solution_name: 'Cryptex'
          reports_path: 'linter-reports'
  
  create-release-tag:
    runs-on: ubuntu-latest
    name: Create release tag
    needs: pre-publish
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Added for accurate --generate-notes

      - name: Create GitHub Release using Official GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Fixed bash spacing syntax
          if [ "${{ inputs.is-prerelease }}" = "true" ]; then
            gh release create ${{ inputs.release-tag-name }} \
              --title "Release ${{ inputs.release-tag-name }}" \
              --generate-notes \
              --prerelease
          else
            gh release create ${{ inputs.release-tag-name }} \
              --title "Release ${{ inputs.release-tag-name }}" \
              --generate-notes
          fi
  
  publish-aot:
    name: Publish for ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: create-release-tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .dll
          - os: ubuntu-latest
            rid: linux-x64
            ext: .so
          - os: macos-latest
            rid: osx-arm64
            ext: .dylib
          - os: macos-13
            rid: osx-x64
            ext: .dylib
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Critical fix: Code must be checked out to publish

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish Cryptex
        run: |
          dotnet publish ./Cryptex/Cryptex.csproj \
          -c Release -r ${{ matrix.rid }} \
          -p:PublishAOT=true \
          -p:TreatWarningsAsErrors=true \
          --output ./publish-folder/${{ matrix.rid }}

      - name: Rename library for release
        shell: bash
        run: |
          mkdir -p ./publish-folder/out
          mv "./publish-folder/${{ matrix.rid }}/Cryptex${{ matrix.ext }}" "./publish-folder/out/MyLibrary-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release upload ${{ inputs.release-tag-name }} "./publish-folder/out/MyLibrary-${{ matrix.rid }}${{ matrix.ext }}"