name: Publish Cryptex Lib

on:
  workflow_dispatch:
    inputs:
      release-tag-name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string
      is-prerelease:
        description: 'Mark as pre-release? (e.g. beta, rc)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  pre-publish:
    runs-on: ubuntu-latest
    name: Pre-publish
    container: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ReSharper Inspection
        uses: ./.github/actions/resharper-inspect
        with:
          solution_name: 'Cryptex'
          reports_path: 'linter-reports'

  create-release-tag:
    runs-on: ubuntu-latest
    name: Create release tag
    needs: pre-publish
    # Map the step output to a job output so the cleanup job can read it
    outputs:
      release_created: ${{ steps.create_release.outputs.created_new }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Skip GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Check if the release already exists
          if gh release view "${{ inputs.release-tag-name }}" > /dev/null 2>&1; then
            echo "Release ${{ inputs.release-tag-name }} already exists. Skipping creation."
            echo "created_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release does not exist. Creating..."
            if [ "${{ inputs.is-prerelease }}" = "true" ]; then
              gh release create ${{ inputs.release-tag-name }} \
                --title "Release ${{ inputs.release-tag-name }}" \
                --generate-notes \
                --prerelease
            else
              gh release create ${{ inputs.release-tag-name }} \
                --title "Release ${{ inputs.release-tag-name }}" \
                --generate-notes
            fi
            # Flag that we actually created it during this run
            echo "created_new=true" >> "$GITHUB_OUTPUT"
          fi

  publish-aot:
    name: Publish for ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: create-release-tag
    strategy:
      # If one matrix job fails, cancel the rest to speed up cleanup
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .dll
          - os: ubuntu-latest
            rid: linux-x64
            ext: .so
          - os: macos-latest
            rid: osx-arm64
            ext: .dylib
          - os: macos-13
            rid: osx-x64
            ext: .dylib
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish Cryptex
        run: |
          dotnet publish Cryptex/Cryptex.csproj -c Release -r ${{ matrix.rid }} -p:PublishAOT=true -p:TreatWarningsAsErrors=true --output ./publish-folder/${{ matrix.rid }}

      - name: Rename library for release
        shell: bash
        run: |
          mkdir -p ./publish-folder/out
          mv "./publish-folder/${{ matrix.rid }}/Cryptex${{ matrix.ext }}" "./publish-folder/out/MyLibrary-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        # Added --clobber to overwrite the file if uploading to a pre-existing release
        run: |
          gh release upload ${{ inputs.release-tag-name }} "./publish-folder/out/MyLibrary-${{ matrix.rid }}${{ matrix.ext }}" --clobber

  cleanup-failed-release:
    runs-on: ubuntu-latest
    name: Cleanup on Failure
    # Needs both to run after they are done, but evaluates success/failure logic in the `if` statement
    needs: [ create-release-tag, publish-aot ]
    # Only run if a previous job failed, AND the create-release-tag job was successful, AND we actually created a new release
    if: ${{ failure() && needs.create-release-tag.result == 'success' && needs.create-release-tag.outputs.release_created == 'true' }}
    
    steps:
      - name: Delete Failed Release and Tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          echo "Workflow failed during matrix publish. Rolling back release ${{ inputs.release-tag-name }}..."
          gh release delete "${{ inputs.release-tag-name }}" --cleanup-tag --yes