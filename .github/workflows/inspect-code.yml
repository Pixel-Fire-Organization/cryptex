name: Inspect Code

on:
  push:
    
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint-the-code:
    name: Lint the code
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:10.0
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache dotnet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Run Linter
        run: |
          export SOLUTION_NAME=Cryptex
          export REPORTS_PATH=linter-reports
          dotnet new tool-manifest
          dotnet tool install JetBrains.ReSharper.GlobalTools
          dotnet tool restore
          dotnet jb inspectcode ${SOLUTION_NAME}.sln --profile=".editorconfig" --output="${REPORTS_PATH}/jb-${{ github.run_number }}.sarif" --format=Sarif --properties:Configuration=Release

      - name: Upload Report to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: linter-reports/jb-${{ github.run_number }}.sarif
          category: resharper

      - name: Upload linter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linter-reports.zip
          path: linter-reports/
